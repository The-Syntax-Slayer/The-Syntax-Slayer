name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 03:00 UTC
  push:
    branches:
      - main
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=The-Syntax-Slayer&theme=tokyonight&hide_border=true&background=0d1117&ring=764ba2&fire=f093fb&currstreak=f093fb&sideNums=764ba2&sideLabels=764ba2&dates=c9d1d9
          path: assets/streak-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak-stats.svg
          git commit -m "Update streak stats SVG" || echo "No changes to commit"
          git push origin main
